name: Bug report
description: Report a defect or regression.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide steps, input, or examples that reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share relevant version, platform, or dependency details.
