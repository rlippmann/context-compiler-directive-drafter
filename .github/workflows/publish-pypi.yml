name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  release-gate:
    name: Release validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run pytest stress loop
        shell: bash
        run: |
          loops="10"
          for i in $(seq 1 "$loops"); do
            echo "== stress run $i/$loops =="
            uv run pytest -q
          done

  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Show built distributions
        run: |
          echo "Built distributions:"
          ls -lh dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  artifact-validation:
    name: Validate built artifacts
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install twine
        run: python -m pip install twine

      - name: Check built distributions
        run: python -m twine check dist/*

      - name: Install built wheel in clean virtual environment
        shell: bash
        run: |
          python -m venv /tmp/ccdd-wheel-smoke
          /tmp/ccdd-wheel-smoke/bin/pip install dist/context_compiler_directive_drafter-*.whl

      - name: Run installed-wheel import/resource smoke
        shell: bash
        run: |
          /tmp/ccdd-wheel-smoke/bin/python -c "from importlib.resources import files; import context_compiler_directive_drafter as m; required = {'PREPROCESS_OUTCOME_DIRECTIVE','PREPROCESS_OUTCOME_NO_DIRECTIVE','PREPROCESS_OUTCOME_UNKNOWN','PREPROCESSOR_NO_DIRECTIVE_SENTINEL','PreprocessResult','PreprocessOutcome','parse_preprocessor_output','preprocess_heuristic','render_prompt','validate_preprocessor_output'}; missing = sorted(name for name in required if not hasattr(m, name)); assert not missing, missing; assert files('context_compiler_directive_drafter').joinpath('prompts/default.txt').read_text(encoding='utf-8'); print('wheel-smoke: ok')"

  publish:
    name: Publish to PyPI
    needs: [release-gate, build, artifact-validation]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/context-compiler-directive-drafter

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
